<!DOCTYPE html>
<html>
<head>
  <title>SXP Test</title>
</head>
<body>

<button onclick="createUser()">Create Wallet</button>

<pre id="output"></pre>

<script>
async function createUser() {
  const res = await fetch("https://kind-rejoicing-production-dba9.up.railway.app/api/users/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({})
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
